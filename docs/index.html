<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="VitaTrack"/>
  <meta name="theme-color" content="#16A34A"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon.svg"/>
  <link rel="stylesheet" href="style.css"/>
  <title>VitaTrack</title>
</head>
<body>

<!-- Ambient blobs (fade in on dark mode via CSS) -->
<div class="ambient">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<!-- Login screen -->
<div id="ls">
  <div class="ll">🌿</div>
  <div class="lt">VitaTrack</div>
  <div class="ls">Your daily life tracker<br>Simple · Private · Free</div>
  <button class="gb" onclick="signInGoogle()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Sign in with Google
  </button>
  <button class="db" onclick="demoLogin()">Continue without Google</button>
  <p style="margin-top:1.5rem;font-size:11.5px;color:var(--ht);text-align:center;line-height:1.7">
    No location · No photos · No camera<br>Your data stays in your own Google Sheet
  </p>
  <button onclick="demoLogin();setTimeout(()=>nav('settings'),100)" style="margin-top:0.75rem;background:none;border:none;font-size:13px;color:var(--ht);cursor:pointer">⚙️ Settings</button>
</div>

<!-- Main app -->
<div id="app">
  <div class="hd">
    <div class="hb">VITATRACK 🌿</div>
    <div class="hr">
      <div style="display:flex;align-items:center">
        <span class="bk" id="bk" onclick="goBack()">◀ Back</span>
        <span class="ht" id="pt">Dashboard</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:11px;color:var(--mt)" id="hd2"></span>
        <span id="ss"></span>
        <button class="thm-btn" id="thm" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
      </div>
    </div>
  </div>
  <div class="ct" id="con"></div>
  <nav class="bn">
    <button class="nb a" onclick="nav('home',this)"><span class="ni">🏠</span><span class="nl">HOME</span></button>
    <button class="nb"   onclick="nav('score',this)"><span class="ni">📊</span><span class="nl">SCORE</span></button>
    <button class="nb"   onclick="nav('track',this)"><span class="ni">✅</span><span class="nl">TRACK</span></button>
    <button class="nb"   onclick="nav('journal',this)"><span class="ni">📓</span><span class="nl">JOURNAL</span></button>
    <button class="nb"   onclick="nav('settings',this)"><span class="ni">⚙️</span><span class="nl">SETTINGS</span></button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="app.js"></script>
</body>
</html>
