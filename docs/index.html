<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="VitaTrack"/>
  <meta name="theme-color" content="#16A34A"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon.svg"/>
  <link rel="stylesheet" href="style.css"/>
  <title>VitaTrack</title>
</head>
<body>

<!-- Ambient blobs (fade in on dark mode via CSS) -->
<div class="ambient">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<!-- Login screen -->
<div id="ls">
  <div class="ll">🌿</div>
  <div class="lt">VitaTrack</div>
  <div class="ls">Your daily life tracker<br>Simple · Private · Free</div>
  <input class="fl" id="lemail" type="email" placeholder="Your email" style="margin-bottom:10px;padding:13px 16px;font-size:15px;border-radius:14px;width:100%"/>
  <input class="fl" id="lpwd" type="password" placeholder="Password" style="margin-bottom:4px;padding:13px 16px;font-size:15px;border-radius:14px;width:100%" onkeydown="if(event.key==='Enter')localLogin()"/>
  <div id="lerr" style="font-size:12px;color:#DC2626;min-height:18px;margin-bottom:6px;text-align:left;width:100%"></div>
  <button class="gb" onclick="localLogin()" style="margin-top:4px">Sign in</button>
  <p style="margin-top:1.5rem;font-size:11.5px;color:var(--ht);text-align:center;line-height:1.7">
    No location · No photos · No camera<br>Your data stays on this device
  </p>
</div>

<!-- Main app -->
<div id="app">
  <div class="hd">
    <div class="hb">VITATRACK 🌿</div>
    <div class="hr">
      <div style="display:flex;align-items:center">
        <span class="bk" id="bk" onclick="goBack()">◀ Back</span>
        <span class="ht" id="pt">Dashboard</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:11px;color:var(--mt)" id="hd2"></span>
        <span id="ss"></span>
        <button class="thm-btn" id="thm" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
      </div>
    </div>
  </div>
  <div class="ct" id="con"></div>
  <nav class="bn">
    <button class="nb a" onclick="nav('home',this)"><span class="ni">🏠</span><span class="nl">HOME</span></button>
    <button class="nb"   onclick="nav('score',this)"><span class="ni">📊</span><span class="nl">SCORE</span></button>
    <button class="nb"   onclick="nav('track',this)"><span class="ni">✅</span><span class="nl">TRACK</span></button>
    <button class="nb"   onclick="nav('journal',this)"><span class="ni">📓</span><span class="nl">JOURNAL</span></button>
    <button class="nb"   onclick="nav('settings',this)"><span class="ni">⚙️</span><span class="nl">SETTINGS</span></button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
